<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Tier List Maker</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #262626;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 20px;
            font-weight: 700;
        }

        .tier-container {
            width: 100%;
            max-width: 900px;
            border: 2px solid #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tier-row {
            display: flex;
            border-bottom: 1px solid #333;
            min-height: 90px;
            background-color: var(--panel-color);
        }

        .tier-row:last-child {
            border-bottom: none;
        }

        .tier-label {
            width: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #000;
            text-shadow: 0px 1px 2px rgba(255,255,255,0.3);
            user-select: none;
            flex-shrink: 0;
        }

        /* Tier Colors */
        .tier-s { background-color: #ff7f7f; }
        .tier-a { background-color: #ffbf7f; }
        .tier-b { background-color: #ffdf7f; }
        .tier-c { background-color: #ffff7f; }
        .tier-d { background-color: #bfff7f; }
        .tier-f { background-color: #7fff7f; }

        .tier-bench {
            background-color: #333;
            min-height: 120px;
        }
        .tier-bench .tier-label {
            background-color: #555;
            color: #fff;
            font-size: 16px;
        }

        .tier-dropzone {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 10px;
            gap: 10px;
            flex-grow: 1;
            transition: background-color 0.2s ease;
        }

        .tier-dropzone.drag-over {
            background-color: #3d3d3d;
        }

        .logo-card {
            width: 65px;
            height: 65px;
            background-color: #fff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }

        .logo-card:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        .logo-card img {
            width: 85%;
            height: 85%;
            pointer-events: none; /* Prevents ghost dragging image issues */
        }

        .controls {
            margin-top: 10px;
        }

        button {
            background-color: #007aff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background-color: #0063cc;
        }
    </style>
</head>

            <div class="tier-dropzone" id="tier-d"></div>
        </div>

            <div class="tier-dropzone" id="tier-f"></div>
